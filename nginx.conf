events { worker_connections 1024; }

http {
  upstream copilot_api {
    server api:8000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://copilot_api;
      proxy_read_timeout 35s;
      proxy_connect_timeout 5s;
      proxy_next_upstream error timeout http_502 http_503;
    }

    location /health {
      proxy_pass http://copilot_api;
      access_log off;
    }
  }
}